window.dist = function(a,b){
  if(!a?.lat||!b?.lat)return null;
  const R=6371,dL=(b.lat-a.lat)*Math.PI/180,dG=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dG/2)**2;
  return Math.round(2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*10)/10;
};

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {

  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}

        </div>
        <div className="twk-body">
          {children}

              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />

          )}

      </div>
    </>
  );

function TweakRow({ label, value, children, inline = false }) {

      </div>

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}

    </TweakRow>

}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}

  );
}

function TweakText({ label, value, placeholder, onChange }) {

             onChange={(e) => onChange(e.target.value)} />

  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// Parse min budget for budget tab
function parseBud(b){
  if(!b) return 0;
  const s = String(b);
  if(/free|—|varies/i.test(s)) return 0;
  const parts = s.split(/[-–~]/).map(x=>x.trim()).filter(Boolean);
  // Determine fallback suffix from any part
  let fallback = "";
  for(const p of parts){ const m=p.match(/([kKmM])/); if(m){ fallback=m[1]; break; } }
  const nums = parts.map(p => {
    const m = p.match(/(\d+(?:\.\d+)?)\s*([kKmM]?)/);
    if(!m) return null;
    let n = parseFloat(m[1]);
    let suffix = m[2] || fallback;
    if(suffix==="M"||suffix==="m") n *= 1000000;
    else if(suffix==="k"||suffix==="K") n *= 1000;
    return n;
  }).filter(n=>n!==null && !isNaN(n));
  if(nums.length===0) return 0;
  return Math.round(nums.reduce((a,b)=>a+b,0)/nums.length);
}

// ===== Pull-to-refresh =====
function usePullRefresh(onRefresh){
  const [pull, setPull] = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const startY = useRef(null);
  useEffect(() => {
    const onTouchStart = (e) => {
      if(window.scrollY <= 0 && !refreshing) startY.current = e.touches[0].clientY;
    };
    const onTouchMove = (e) => {
      if(startY.current === null) return;
      const dy = e.touches[0].clientY - startY.current;
      if(dy > 0 && window.scrollY <= 0){
        setPull(Math.min(dy * 0.5, 100));
      }
    };
    const onTouchEnd = async () => {
      if(pull > 60){
        setRefreshing(true);
        await onRefresh();
        setTimeout(()=>{ setRefreshing(false); setPull(0); }, 700);
      } else {
        setPull(0);
      }
      startY.current = null;
    };
    window.addEventListener('touchstart', onTouchStart, {passive:true});
    window.addEventListener('touchmove', onTouchMove, {passive:true});
    window.addEventListener('touchend', onTouchEnd);
    return () => {
      window.removeEventListener('touchstart', onTouchStart);
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchend', onTouchEnd);
    };
  }, [pull, refreshing, onRefresh]);
  return {pull, refreshing};
}

  const km = p ? window.dist(p, r) : null;
  const ci = r.cat && window.CATS[r.cat];
  const cc = ci ? ci.c : "#999";
  const [dx, setDx] = useState(0);
  const [expanded, setExpanded] = useState(false);
  const [editTime, setEditTime] = useState(false);
  const startX = useRef(null);
  const moved = useRef(false);

  const onStart = (e) => {
    if(a.fix) return;
    startX.current = e.touches ? e.touches[0].clientX : e.clientX;
    moved.current = false;
  };
  const onMove = (e) => {
    if(startX.current === null) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const d = x - startX.current;
    if(Math.abs(d) > 4) moved.current = true;
    setDx(Math.max(-120, Math.min(60, d)));
  };
  const onEnd = () => {
    if(startX.current === null) return;
    if(dx < -70){

      if(a.pk) onSwapOpen();
      setDx(0);
    } else if(dx > 50){
      // mark visited (toggle expand for now)
      setDx(0);
    } else {
      setDx(0);
    }
    startX.current = null;
    setTimeout(()=>{ moved.current = false; }, 50);

            🔀 {T(lang, "สลับ", "Swap")}

            {/* photo / emoji slot */}

        </div>
        <div>
          <div style={{fontSize:"calc(10px * var(--fs))",opacity:.8,fontWeight:700}}>📍 {day.acts.length}</div>
          <div style={{fontSize:"calc(16px * var(--fs))",fontWeight:700}}>{T(lang,"จุด","stops")}</div>
        </div>
      </div>

      {/* outfit card — full width */}
      <div style={{
        marginTop:12, padding:"12px 14px",
        background:"rgba(255,255,255,0.92)", color:"#1a1a2e",
        borderRadius:14,
      }}>

        <div style={{fontSize:"calc(14px * var(--fs))",fontWeight:700}}>{outfit.style}: <span style={{fontWeight:400,color:"#555"}}>{outfit.desc}</span></div>
        <div style={{fontSize:"calc(12px * var(--fs))",marginTop:4}}>{T(lang,"สีที่แนะนำ","Colors")}: {outfit.colors}</div>
        <div style={{fontSize:"calc(11px * var(--fs))",color:"#888",marginTop:4}}>{outfit.tips}</div>
      </div>
    </div>
  );
}

// ===== Trip Screen =====
function TripScreen({days, ad, setAd, lang, onSwap, onMove, onRemove, onAdd, customAdd, onTimeChange}){
  const [swapTarget, setSwapTarget] = useState(null); // {di, ai}
  const [addOpen, setAddOpen] = useState(false);
  const [addCat, setAddCat] = useState(null);
  const [searchQ, setSearchQ] = useState("");
  const [swapCat, setSwapCat] = useState(null);
  const [mapResults, setMapResults] = useState([]);
  const [mapLoading, setMapLoading] = useState(false);
  const searchTimer = useRef(null);

  // Search places via Nominatim with Da Nang bounding box
  const searchMaps = (q) => {
    if(!q || q.length < 2) { setMapResults([]); return; }
    clearTimeout(searchTimer.current);
    searchTimer.current = setTimeout(async () => {
      setMapLoading(true);
      try {
        // Search within Da Nang area using viewbox
        const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&viewbox=108.10,15.90,108.40,16.20&bounded=1&limit=5&addressdetails=1&extratags=1`);
        const data = await resp.json();
        if(data.length === 0) {
          // Fallback: search globally with "Da Nang"
          const resp2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q+" Da Nang")}&limit=5&addressdetails=1&extratags=1`);
          const data2 = await resp2.json();
          setMapResults(data2.map(r => parseNominatim(r)));
        } else {
          setMapResults(data.map(r => parseNominatim(r)));
        }
      } catch(e) { setMapResults([]); }
      setMapLoading(false);
    }, 500);
  };

  const parseNominatim = (r) => {
    const addr = r.address || {};
    const road = addr.road || addr.pedestrian || "";
    const number = addr.house_number || "";
    const district = addr.suburb || addr.neighbourhood || addr.city_district || "";
    const fullAddr = [number, road, district].filter(Boolean).join(", ") || r.display_name?.split(",").slice(0,2).join(",") || "Da Nang";
    const tags = r.extratags || {};
    const rating = tags["stars"] || null;
    // Auto-detect category from OSM type/class
    const t = (r.type||"").toLowerCase();
    const c = (r.class||"").toLowerCase();
    let autoCat = "activity";
    if(/restaurant|fast_food|food_court|bbq/.test(t)||c==="restaurant") autoCat = "food";
    else if(/cafe|coffee|bakery|ice_cream/.test(t)) autoCat = "cafe";
    else if(/bar|pub|nightclub|biergarten/.test(t)) autoCat = "nightlife";
    else if(/shop|clothes|boutique|jewelry|jewellery|supermarket|mall|marketplace/.test(t)||c==="shop") autoCat = "shopping";
    else if(/hotel|guest_house|hostel/.test(t)) autoCat = "activity";
    return {
      name: r.display_name?.split(",")[0] || r.name || "",
      addr: fullAddr,
      lat: parseFloat(r.lat),
      lng: parseFloat(r.lon),
      type: t,
      autoCat: autoCat,
      rating: rating,
      cuisine: tags.cuisine || null,
      phone: tags.phone || null,
      opening: tags.opening_hours || null,
    };
  };
  const cur = days.find(d => d.id === ad);

  return (
    <div style={{padding:"0 16px 100px",position:"relative"}}>
      {/* Day swiper tabs */}
      <div style={{
        display:"flex", gap:6, padding:"10px 0 14px",
        overflowX:"auto", scrollSnapType:"x mandatory",
        margin:"0 -16px", paddingLeft:16, paddingRight:16,
      }}>
        {days.map(d => (
          <button key={d.id} onClick={()=>setAd(d.id)} style={{
            minWidth:74, padding:"10px 0", textAlign:"center",
            border: ad===d.id ? `2px solid ${d.c}` : "1.5px solid rgba(0,0,0,0.04)",
            borderRadius:14,
            background: ad===d.id ? `${d.c}18` : "#fff",
            color: ad===d.id ? d.c : "#666",
            fontFamily:"inherit", fontWeight:700,
            cursor:"pointer",
            boxShadow: ad===d.id ? `0 4px 12px ${d.c}30` : "0 2px 6px rgba(0,0,0,0.04)",
            transition:"all .25s",
            scrollSnapAlign:"start",
          }}>
            <div style={{fontSize:"calc(20px * var(--fs))",lineHeight:1}}>{(window.INIT.find(x=>x.id===d.id)||d).ti}</div>
            <div style={{fontSize:"calc(12px * var(--fs))",marginTop:4,opacity:.95}}>D{d.id} {(window.INIT.find(x=>x.id===d.id)||{}).dl?.[lang]||d.id}</div>
          </button>
        ))}
      </div>

      {cur && <DayHero day={cur} lang={lang}/>}

      {/* Bathroom rota mini-card */}
      {cur && (
        <div style={{
          padding:"10px 14px", marginBottom:14,
          background:"#fff", borderRadius:14,
          border:`1.5px dashed ${cur.c2}55`,
          fontSize:"calc(12px * var(--fs))",
        }}>
          <div style={{fontSize:"calc(11px * var(--fs))",color:cur.c2,fontWeight:700,letterSpacing:1}}>
            🚿 {T(lang, I18N.bath.th, I18N.bath.en)}
          </div>
          <div style={{color:"#555",marginTop:3,fontWeight:600}}>{cur.bath}</div>
        </div>
      )}

      {/* Swipe hint (first time) */}
      {cur && cur.acts.some(a=>!a.fix) && (
        <div style={{
          textAlign:"center", marginBottom:12,
          fontSize:"calc(11px * var(--fs))", color:"#aaa",
          fontStyle:"italic",
        }}>
          {T(lang, I18N.swipeHint.th, I18N.swipeHint.en)}
        </div>
      )}

      {/* Timeline */}
      {cur && (
        <div style={{position:"relative"}}>
          {/* vertical line */}
          <div style={{
            position:"absolute", left:32, top:30, bottom:50,
            width:2, background:`linear-gradient(180deg, ${cur.c2}33, ${cur.c2}11)`,
            borderRadius:2, zIndex:0,
          }}/>
          {cur.acts.map((a, i) => (
            <div key={a.pk||a.id||i} style={{position:"relative",paddingLeft:54}}>
              {/* dot */}
              <div style={{
                position:"absolute", left:24, top:18,
                width:18, height:18, borderRadius:"50%",
                background:"#fff", border:`3px solid ${cur.c2}`,
                zIndex:1,
                boxShadow:`0 0 0 4px ${cur.c2}22`,
              }}/>
              <ActivityCard
                a={a} prev={i>0?cur.acts[i-1]:null} day={cur} lang={lang}
                onSwapOpen={()=>{setSwapCat(null);setSwapTarget({di:cur.id, ai:i});}}
                onUp={()=>onMove(cur.id,i,-1)}
                onDn={()=>onMove(cur.id,i,1)}
                onRemove={()=>onRemove(cur.id,i)}
                onTimeChange={nt=>onTimeChange(cur.id,i,nt)}
              />
            </div>
          ))}

          {/* end dot */}
          <div style={{position:"relative",paddingLeft:54,paddingTop:6}}>
            <div style={{
              position:"absolute", left:26, top:8,
              width:14, height:14, borderRadius:"50%",
              background:cur.c2, zIndex:1,
            }}/>
            <button onClick={()=>setAddOpen(true)} style={{
              width:"100%", padding:"14px",
              border:`2px dashed ${cur.c2}66`,
              background:"transparent", borderRadius:16,
              color:cur.c2, fontWeight:700,
              fontSize:"calc(14px * var(--fs))",
              fontFamily:"inherit", cursor:"pointer",
            }}>+ {T(lang, I18N.add.th, I18N.add.en)}</button>
          </div>
        </div>
      )}

      {/* Swap sheet */}
      <SwapSheet
        open={swapTarget !== null}
        current={swapTarget ? cur.acts[swapTarget.ai] : null}
        onClose={()=>setSwapTarget(null)}
        onSwap={(nk)=>onSwap(swapTarget.di, swapTarget.ai, nk)}
        lang={lang}
        swapCat={swapCat}
        setSwapCat={setSwapCat}
      />

      {/* Add sheet */}
      {addOpen && cur && (
        <div onClick={()=>{setAddOpen(false);setAddCat(null);setSearchQ("");}} style={{
          position:"fixed", inset:0, zIndex:50, background:"rgba(0,0,0,0.4)",
        }}>
          <div onClick={e=>e.stopPropagation()} style={{
            position:"absolute",left:0,right:0,bottom:0,
            background:"#fffaf3", borderTopLeftRadius:28, borderTopRightRadius:28,
            padding:"12px 18px 28px", maxHeight:"82vh",overflowY:"auto",
          }}>
            <div style={{width:42,height:5,background:"#ddd",borderRadius:3,margin:"6px auto 14px"}}/>
            <div style={{fontSize:"calc(20px * var(--fs))",fontWeight:700,marginBottom:10}}>
              + {T(lang, I18N.add.th, I18N.add.en)}
            </div>
            <input value={searchQ} onChange={e=>{setSearchQ(e.target.value);searchMaps(e.target.value);}}
              placeholder={T(lang, "ค้นหาสถานที่ หรือพิมพ์ค้นจาก Maps...", "Search places or type to find on Maps...")}
              style={{
                width:"100%", padding:"12px 14px", borderRadius:14,
                border:"1.5px solid #e0d8c8", background:"#fff",
                fontFamily:"inherit", fontSize:"calc(14px * var(--fs))",
                outline:"none", marginBottom:12,
              }}/>
            {!searchQ && (
              <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                {Object.entries(window.CATS).map(([k,v]) => {
                  const cnt = Object.entries(window.P).filter(([pk,pv])=>pv.cat===k && !cur.acts.some(a=>a.pk===pk)).length;
                  return (
                    <button key={k} onClick={()=>setAddCat(addCat===k?null:k)} style={{
                      padding:"8px 12px", borderRadius:12,
                      border: addCat===k ? `2px solid ${v.c}` : "2px solid #f0ece3",
                      background: addCat===k ? `${v.c}15` : "#fff",
                      color: addCat===k ? v.c : "#666", fontWeight:700,
                      fontFamily:"inherit", fontSize:"calc(12px * var(--fs))",
                      cursor:"pointer",
                    }}>{v.i} {v[lang]||v.en} <span style={{opacity:.6}}>({cnt})</span></button>
                  );
                })}
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {(searchQ
                ? Object.entries(window.P).filter(([k,v]) => !cur.acts.some(a=>a.pk===k) && (v.t.toLowerCase().includes(searchQ.toLowerCase()) || (v.th||"").includes(searchQ) || (v.en||"").toLowerCase().includes(searchQ.toLowerCase())))
                : addCat ? Object.entries(window.P).filter(([k,v]) => v.cat===addCat && !cur.acts.some(a=>a.pk===k))
                : []
              ).map(([k,v]) => (
                <button key={k} onClick={()=>{onAdd(cur.id,k);setAddOpen(false);setSearchQ("");setAddCat(null);}} style={{

                  padding:10, border:"1.5px solid #f0ece3",borderRadius:14,
                  background:"#fff", fontFamily:"inherit", textAlign:"left",
                  cursor:"pointer", width:"100%",

                  <div style={{
                    width:48,height:48,borderRadius:12,
                    background: window.CATS[v.cat]?.grad,

                  <div style={{flex:1,minWidth:0}}>

                    <div style={{fontSize:"calc(11px * var(--fs))",color:"#888"}}>{descOf(v, lang)}</div>
                    <div style={{fontSize:"calc(10px * var(--fs))",color:"#aaa",marginTop:2}}>💰 {v.bud} · ⏱ {window.DUR[k]||60}{T(lang,"น","m")}</div>
                  </div>
                  <span style={{fontSize:18,color:"#0a8a6c"}}>+</span>

                  }} style={{
                    display:"flex",gap:10,alignItems:"center",

                    background:"#f0f8ff", fontFamily:"inherit", textAlign:"left",
                    cursor:"pointer", width:"100%", marginBottom:6,
                  }}>
                    <div style={{
                      width:40,height:40,borderRadius:10,
                      background: window.CATS[r.autoCat] ? window.CATS[r.autoCat].grad : "linear-gradient(135deg,#4285f4,#1a73e8)",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:18, color:"#fff", flexShrink:0,
                    }}>{window.CATS[r.autoCat] ? window.CATS[r.autoCat].i : "📍"}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:"calc(13px * var(--fs))",color:"#1a1a2e"}}>{r.name}</div>
                      <div style={{fontSize:"calc(10px * var(--fs))",color:"#888",marginTop:2}}>📍 {r.addr}</div>
                      <div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}>
                        {r.autoCat && window.CATS[r.autoCat] && <span style={{fontSize:"calc(9px * var(--fs))",fontWeight:600,color:window.CATS[r.autoCat].c,background:window.CATS[r.autoCat].c+"15",padding:"1px 6px",borderRadius:5}}>{window.CATS[r.autoCat].i} {window.CATS[r.autoCat][lang]||r.type}</span>}

                ))}
                {/* Always show Google Maps link */}
                <a href={`https://www.google.com/maps/search/${encodeURIComponent(searchQ+" Da Nang")}`}
                  target="_blank" rel="noopener"
                  style={{
                    display:"flex",alignItems:"center",justifyContent:"center",gap:8,
                    width:"100%", padding:"10px 14px", borderRadius:14,
                    background:"linear-gradient(135deg,#4285f4,#1a73e8)",
                    color:"#fff", textDecoration:"none", fontFamily:"inherit",
                    fontWeight:700, fontSize:"calc(12px * var(--fs))",
                    marginBottom:8, marginTop:8,
                  }}>

                {/* Quick add with address from Google Maps */}
                {(() => {
                  const bestMatch = mapResults.length > 0 ? mapResults[0] : null;
                  return (
                  <div style={{padding:"10px 12px",border:"1.5px solid #e8f0fe",borderRadius:14,background:"#f8faff"}}>
                    <div style={{fontSize:"calc(11px * var(--fs))",fontWeight:700,color:"#1a73e8",marginBottom:6}}>
                      ➕ {T(lang,`เพิ่ม "${searchQ}" เข้าทริป`,`Add "${searchQ}" to trip`)}
                    </div>
                    {bestMatch && <div style={{fontSize:"calc(10px * var(--fs))",color:"#06d6a0",marginBottom:4}}>✓ {T(lang,"พบที่อยู่:","Found address:")} {bestMatch.addr}</div>}
                    {!bestMatch && <div style={{marginBottom:6}}>
                      <div style={{fontSize:"calc(10px * var(--fs))",color:"#888",marginBottom:3}}>📍 {T(lang,"วางที่อยู่จาก Google Maps:","Paste address from Google Maps:")}</div>
                      <input id="addrInput" placeholder={T(lang,"เช่น 265 Phan Châu Trinh, Hải Châu","e.g. 265 Phan Châu Trinh")}
                        onClick={e=>e.stopPropagation()}
                        style={{width:"100%",padding:"6px 10px",borderRadius:8,border:"1.5px solid #e0d8c8",fontFamily:"inherit",fontSize:"calc(11px * var(--fs))",outline:"none"}}/>
                    </div>}
                    <div style={{fontSize:"calc(10px * var(--fs))",color:"#888",marginBottom:4}}>{T(lang,"เลือกหมวด:","Pick category:")}</div>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      {Object.entries(window.CATS).map(([k,v]) => (
                        <button key={k} onClick={()=>{
                          const addrEl = document.getElementById("addrInput");
                          const typedAddr = addrEl ? addrEl.value : "";
                          customAdd(cur.id, bestMatch?.name||searchQ, k,
                            bestMatch?.lat||16.06, bestMatch?.lng||108.24,
                            bestMatch?.addr || typedAddr || "Da Nang, Vietnam",
                            {cuisine:bestMatch?.cuisine, rating:bestMatch?.rating});
                          setAddOpen(false);setSearchQ("");setAddCat(null);setMapResults([]);
                        }} style={{
                          padding:"6px 10px", borderRadius:10,
                          border:`1.5px solid ${v.c}55`, background:`${v.c}10`,
                          color:v.c, fontFamily:"inherit", fontWeight:600,
                          fontSize:"calc(11px * var(--fs))", cursor:"pointer",
                        }}>{v.i} {v[lang]||v.en}</button>
                      ))}
                    </div>
                  </div>);
                })()}
              </div>
            )}
            <button onClick={()=>{setAddOpen(false);setAddCat(null);setSearchQ("");}} style={{
              width:"100%", marginTop:14, padding:"12px",
              background:"#f0ece3", border:"none", borderRadius:14,
              fontFamily:"inherit", fontWeight:700,
              fontSize:"calc(14px * var(--fs))", color:"#666", cursor:"pointer",
            }}>{T(lang, I18N.cancel.th, I18N.cancel.en)}</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== Map Screen =====
function MapScreen({days, ad, setAd, lang}){
  const cur = days.find(d => d.id === ad);
  // Only show stops within Da Nang area on the map (filter out BKK transit pins)
  const stops = cur ? cur.acts.map((a,i)=>({...res(a),idx:i}))
    .filter(r=>r.lat && r.lat > 14.5 && r.lat < 17.5 && r.lng > 107 && r.lng < 109) : [];
  const [activeStop, setActiveStop] = useState(0);

  // bounds
  const lats = stops.map(s=>s.lat), lngs = stops.map(s=>s.lng);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const padX = (maxLng-minLng)*0.15+0.005, padY=(maxLat-minLat)*0.15+0.005;
  const W=400, H=460;
  const proj = (lat,lng) => {
    const x = ((lng-(minLng-padX))/((maxLng+padX)-(minLng-padX))) * W;
    const y = H - ((lat-(minLat-padY))/((maxLat+padY)-(minLat-padY))) * H;
    return [x,y];
  };
  const pathD = stops.map((s,i)=>{const [x,y]=proj(s.lat,s.lng);return (i===0?"M":"L")+x+" "+y;}).join(" ");

  return (
    <div style={{padding:"0 16px 100px"}}>
      {/* Day swiper */}
      <div style={{display:"flex",gap:6,padding:"10px 0 14px",overflowX:"auto"}}>
        {days.map(d => (
          <button key={d.id} onClick={()=>{setAd(d.id);setActiveStop(0);}} style={{
            minWidth:64, padding:"8px 0", textAlign:"center",
            border:"none", borderRadius:12,
            background: ad===d.id ? d.c2 : "#fff",
            color: ad===d.id ? "#fff" : "#666",
            fontFamily:"inherit", fontWeight:700, cursor:"pointer",
            fontSize:"calc(12px * var(--fs))",
          }}>{(window.INIT.find(x=>x.id===d.id)||d).ti} D{d.id}</button>
        ))}
      </div>

      {cur && (
        <>
          <div style={{
            background:"linear-gradient(180deg,#cfe9f0,#e6f4f7)",
            borderRadius:20, overflow:"hidden", position:"relative",
            border:`2px solid ${cur.c2}33`,
            marginBottom:12,
          }}>
            <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="auto" style={{display:"block"}}>
              {/* fake roads */}
              <defs>
                <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
                  <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(0,0,0,0.04)" strokeWidth="1"/>
                </pattern>
              </defs>
              <rect width={W} height={H} fill="url(#grid)"/>
              {/* river suggestion */}
              <path d={`M 0 ${H*0.55} Q ${W*0.5} ${H*0.45} ${W} ${H*0.6}`} stroke="#bcdfe8" strokeWidth="20" fill="none" opacity=".7"/>
              {/* coast */}
              <path d={`M ${W} 0 L ${W} ${H} L ${W-30} ${H}`} fill="rgba(105,182,196,0.2)" stroke="rgba(105,182,196,0.4)" strokeWidth="2"/>

              {/* route */}
              <path d={pathD} stroke={cur.c2} strokeWidth="3" fill="none" strokeDasharray="6 5" strokeLinecap="round"/>

              {/* pins */}
              {stops.map((s,i)=>{
                const [x,y] = proj(s.lat,s.lng);
                const active = i===activeStop;
                return (
                  <g key={i} onClick={()=>setActiveStop(i)} style={{cursor:"pointer"}}>
                    <circle cx={x} cy={y+18} r={active?6:4} fill="rgba(0,0,0,0.15)"/>
                    <path d={`M ${x} ${y-30} a 14 14 0 1 0 0.001 0`} fill={active?cur.c2:"#fff"} stroke={cur.c2} strokeWidth="2.5"/>
                    <circle cx={x} cy={y-16} r="14" fill={active?cur.c2:"#fff"}/>
                    <text x={x} y={y-11} textAnchor="middle" fontSize="14" fill={active?"#fff":cur.c2}>{i+1}</text>
                  </g>
                );
              })}
            </svg>
          </div>

          {/* Stop swiper */}
          <div style={{display:"flex",gap:8,overflowX:"auto",margin:"0 -16px",padding:"0 16px 4px"}}>
            {stops.map((s,i)=>(
              <button key={i} onClick={()=>setActiveStop(i)} style={{
                minWidth:160,
                padding:"10px 12px",
                border: i===activeStop ? `2px solid ${cur.c2}` : "2px solid #f0ece3",
                background: i===activeStop ? "#fff" : "#fff",
                borderRadius:14, fontFamily:"inherit", textAlign:"left",
                cursor:"pointer", flexShrink:0,
                boxShadow: i===activeStop ? `0 6px 14px ${cur.c2}33` : "none",
                transition:"all .2s",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{
                    width:22,height:22,borderRadius:"50%",
                    background:cur.c2,color:"#fff",fontWeight:700,fontSize:"calc(11px * var(--fs))",
                    display:"flex",alignItems:"center",justifyContent:"center",
                  }}>{i+1}</span>
                  <span style={{fontSize:"calc(11px * var(--fs))",color:"#999",fontWeight:700}}>{s.time}</span>
                </div>
                <div style={{fontWeight:700,fontSize:"calc(14px * var(--fs))",color:"#1a1a2e",lineHeight:1.2}}>{s.t}</div>
                <div style={{fontSize:"calc(11px * var(--fs))",color:"#888",marginTop:2}}>{s.img} {descOf(s,lang).slice(0,30)}</div>
              </button>
            ))}
          </div>

          {/* Open in Google Maps */}
          {stops[activeStop] && (
            <a href={`https://www.google.com/maps/search/${encodeURIComponent((stops[activeStop].t||"")+" "+(stops[activeStop].addr||"")+" Da Nang")}`}
              target="_blank" rel="noopener" style={{
              display:"block", marginTop:14,
              background:"linear-gradient(135deg,#4285f4,#1a73e8)", color:"#fff",
              padding:"14px", borderRadius:14, textAlign:"center",
              textDecoration:"none", fontWeight:700, fontSize:"calc(14px * var(--fs))",
            }}>{T(lang, I18N.open.th, I18N.open.en)}</a>
          )}
        </>
      )}
    </div>
  );
}

// ===== Main App =====
function App(){
  const tweaksHook = (typeof window.useTweaks==="function") ? window.useTweaks(TWEAKS) : null;
  const t = tweaksHook ? tweaksHook[0] : TWEAKS;
  const setTweak = tweaksHook ? tweaksHook[1] : ()=>{};
  const SAVE_KEY = "danang_trip_v8";
  const isRemote = useRef(false);
  const hasSynced = useRef(false);
  const dbRef = useRef(null);
  const [syncStatus, setSyncStatus] = useState("connecting");

  const loadSaved = () => {
    try { const s = localStorage.getItem(SAVE_KEY); if(s){ const d = JSON.parse(s); if(d && d.length===4) return d; } } catch(e){}
    return null;
  };
  const loadPacked = () => {
    try { return JSON.parse(localStorage.getItem(SAVE_KEY+"_pack")||"{}"); } catch(e){ return {}; }
  };

  const [days, setDays] = useState(() => loadSaved() || window.INIT);
  const [packed, setPackedState] = useState(loadPacked);
  const [ad, setAd] = useState(1);
  const [tab, setTab] = useState("trip");
  const [lang, setLang] = useState(t.lang || "th");

  // Firebase sync
  useEffect(() => {
    let cancelled = false;
    function tryConnect(){
      if(cancelled) return;
      if(!window._fb){ setTimeout(tryConnect,600); return; }
      const planRef = window._fb.ref("plan");
      dbRef.current = planRef;
      planRef.on("value", (snap) => {
        const data = snap.val();
        if(data && Array.isArray(data) && data.length===4){
          isRemote.current = true; setDays(data);
        } else if(!data && !hasSynced.current){
          planRef.set(window.INIT);
        }
        hasSynced.current = true; setSyncStatus("synced");
      });
      const conn = window._fb.ref(".info/connected");
      conn.on("value", s => { if(!cancelled) setSyncStatus(s.val()?"synced":"offline"); });
    }
    tryConnect();
    return () => { cancelled=true; if(dbRef.current) dbRef.current.off(); };
  }, []);

  useEffect(() => {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(days)); } catch(e){}
    if(isRemote.current){ isRemote.current=false; return; }
    if(hasSynced.current && dbRef.current) dbRef.current.set(days);
  }, [days]);

  useEffect(() => { try { localStorage.setItem(SAVE_KEY+"_pack", JSON.stringify(packed)); } catch(e){} }, [packed]);

  // FS scale
  useEffect(() => {
    document.documentElement.style.setProperty('--fs', t.fontScale || 1);
  }, [t.fontScale]);

  const onSwap = (di,ai,nk) => setDays(p => p.map(d => d.id!==di?d:{...d,acts:d.acts.map((a,i)=>i===ai?{pk:nk,time:a.time}:a)}));
  const onMove = (di,ai,dir) => setDays(p => p.map(d => {
    if(d.id!==di) return d;
    const a = [...d.acts]; const ni = ai+dir;
    if(ni<0||ni>=a.length) return d;
    [a[ai],a[ni]] = [a[ni],a[ai]]; return {...d,acts:a};
  }));
  const onRemove = (di,ai) => setDays(p => p.map(d => d.id!==di?d:{...d,acts:d.acts.filter((_,i)=>i!==ai)}));

  const onTimeChange = (di,ai,newTime) => setDays(prev => prev.map(d => {
    if(d.id!==di) return d;
    const acts = [...d.acts];
    acts[ai] = {...acts[ai], time:newTime};
    const parseT = t => { const m=t.match(/(\d{1,2}):(\d{2})/); return m?parseInt(m[1])*60+parseInt(m[2]):null; };
    const fmtT = m => { const h=Math.floor(m/60)%24; const mn=m%60; return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`; };
    let prevMin = parseT(newTime);
    if(prevMin===null) return {...d, acts};
    const prevR = res(acts[ai]);
    prevMin += prevR.dur||60;
    for(let j=ai+1;j<acts.length;j++){
      if(acts[j].fix) continue;
      const rr = res(acts[j]);
      const travelMin = Math.max(5, Math.round((window.dist(prevR,rr)||2)*3));
      acts[j] = {...acts[j], time: fmtT(prevMin+travelMin)};
      prevMin = prevMin+travelMin+(rr.dur||60);
    }
    return {...d, acts};
  }));
  const onAdd = (di,pk) => setDays(p => p.map(d => {
    if(d.id!==di) return d;
    if(d.acts.some(a=>a.pk===pk)) return d;
    return {...d, acts:[...d.acts, {pk, time:"—"}]};
  }));

  const onCustomAdd = (di, name, cat, lat, lng, addr, extra) => setDays(p => p.map(d => {
    if(d.id!==di) return d;
    const ci = window.CATS[cat] || window.CATS.activity;
    const defaults = {
      cafe:{pay:"💵/💳",bud:"40-80k₫",dur:45},
      food:{pay:"💵/💳",bud:"100-300k₫",dur:60},
      shopping:{pay:"💵/💳",bud:"ตามชิ้น",dur:60},
      activity:{pay:"💵/💳",bud:"ดูหน้าร้าน",dur:60},
      nightlife:{pay:"💵/💳",bud:"100-300k₫",dur:90},
    }[cat] || {pay:"💵/💳",bud:"ดูหน้าร้าน",dur:60};
    const cuisine = extra?.cuisine ? " · "+extra.cuisine : "";
    return {...d, acts:[...d.acts, {
      fix:false, id:"map_"+Date.now(), time:"—",
      t:name,
      th: smartDesc(name, cat, "th") + cuisine,
      en: smartDesc(name, cat, "en") + cuisine,
      cat:cat, img:ci.i, addr:addr||"Da Nang, Vietnam",
      lat:lat||16.06, lng:lng||108.24,
      pay:defaults.pay, bud:defaults.bud,
      rat:extra?.rating||"ดูบน Maps", z:"HC", dur:defaults.dur,
      hrs:extra?.opening||null,
    }]};
  }));

  const {pull, refreshing} = usePullRefresh(async () => {
    if(dbRef.current) {
      const snap = await dbRef.current.once('value');
      const data = snap.val();
      if(data) setDays(data);
    }
  });

  const switchLang = () => {
    const nl = lang==="th"?"en":"th";
    setLang(nl); setTweak('lang', nl);
  };

  const tabBg = "#fffaf3";
  const statusColor = syncStatus==="synced"?"#0a8a6c":syncStatus==="connecting"?"#c97c2a":"#888";

  return (
    <div style={{
      minHeight:"100vh",
      background:"linear-gradient(180deg,#fffaf3 0%,#fef3ec 40%,#f0ece3 100%)",
      paddingTop: pull,
      transition: refreshing ? "padding-top .3s" : "none",
    }}>
      {/* pull-to-refresh indicator */}
      {(pull > 0 || refreshing) && (
        <div style={{
          position:"absolute", top:Math.max(0,pull-50), left:0, right:0,
          textAlign:"center", color:"#999", fontSize:"calc(12px * var(--fs))",
          fontWeight:700, paddingTop:14,
        }}>
          {refreshing ? "🔄 " + T(lang, I18N.refreshing.th, I18N.refreshing.en)
            : pull > 60 ? "↑ " + T(lang, I18N.releaseRefresh.th, I18N.releaseRefresh.en)
            : "↓ " + T(lang, I18N.pullRefresh.th, I18N.pullRefresh.en)}
        </div>
      )}

      {/* Top bar */}
      <div data-comment-anchor="topbar" style={{
        position:"sticky", top:0, zIndex:30,
        background:"rgba(255,250,243,0.9)", backdropFilter:"blur(12px)",
        padding:"14px 16px 10px",
        borderBottom:"1px solid rgba(0,0,0,0.05)",
      }}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{
              fontSize:"calc(26px * var(--fs))",fontWeight:700,
              color:"#1a1a2e",lineHeight:1,
              fontFamily:"'Comic Relief', system-ui, sans-serif",
            }}>
              Da Nang 2026
            </div>
            <div style={{fontSize:"calc(12px * var(--fs))",color:"#bbb",marginTop:2}}>°.🐚⋆🌺˖°🫧</div>
            <div style={{fontSize:"calc(11px * var(--fs))",color:"#999",marginTop:2}}>
              29 May – 1 Jun · <span style={{color:statusColor,fontWeight:700}}>● {T(lang,
                syncStatus==="synced"?I18N.syncOn.th:syncStatus==="connecting"?I18N.syncing.th:I18N.offline.th,
                syncStatus==="synced"?I18N.syncOn.en:syncStatus==="connecting"?I18N.syncing.en:I18N.offline.en
              )}</span>
            </div>
          </div>
          <button onClick={switchLang} style={{
            padding:"8px 14px", borderRadius:14,
            background:"#fff", border:"2px solid #f0ece3",
            fontFamily:"inherit", fontWeight:700,
            fontSize:"calc(13px * var(--fs))", color:"#666",
            cursor:"pointer", minWidth:64,
          }}>{lang==="th"?"🇹🇭 TH":"🇬🇧 EN"}</button>
        </div>
      </div>

      {/* Screens */}
      <div style={{paddingTop:14}}>
        {tab==="trip" && <TripScreen days={days} ad={ad} setAd={setAd} lang={lang}
          onSwap={onSwap} onMove={onMove} onRemove={onRemove} onAdd={onAdd} customAdd={onCustomAdd} onTimeChange={onTimeChange}/>}
        {tab==="map" && <MapScreen days={days} ad={ad} setAd={setAd} lang={lang}/>}
        {tab==="budget" && <BudgetScreen days={days} lang={lang}/>}
        {tab==="pack" && <PackScreen days={days} lang={lang} packed={packed} setPacked={setPackedState}/>}
      </div>

      {/* Bottom nav */}
      <nav data-comment-anchor="bottom-nav" style={{
        position:"fixed", bottom:0, left:0, right:0, zIndex:40,
        background:"rgba(255,255,255,0.96)", backdropFilter:"blur(16px)",
        borderTop:"1px solid rgba(0,0,0,0.06)",
        padding:"8px 0 calc(env(safe-area-inset-bottom, 0px) + 10px)",
        display:"flex",
      }}>
        {[
          {k:"trip",i:"📅",l:I18N.trip},
          {k:"map",i:"🗺️",l:I18N.map},
          {k:"budget",i:"💰",l:I18N.budget},
          {k:"pack",i:"🎒",l:I18N.pack},
        ].map(item => {
          const active = tab===item.k;
          return (
            <button key={item.k} onClick={()=>setTab(item.k)} style={{
              flex:1, border:"none", background:"transparent",
              padding:"6px 0 4px", cursor:"pointer", fontFamily:"inherit",
              color: active ? "#118AB2" : "#999",
              transition:"all .2s",
            }}>
              <div style={{
                fontSize:"calc(22px * var(--fs))",lineHeight:1,
                transform: active?"scale(1.1)":"scale(1)",
                transition:"transform .2s",
              }}>{item.i}</div>
              <div style={{
                fontSize:"calc(11px * var(--fs))",fontWeight:700,marginTop:3,
              }}>{item.l[lang]||item.l.en}</div>
              {active && <div style={{
                width:24,height:3,background:"#118AB2",borderRadius:3,margin:"3px auto 0",
              }}/>}
            </button>
          );
        })}
      </nav>

      {/* Tweaks panel */}
      {window.TweaksPanel && window.TweakSection && window.TweakSlider && window.TweakRadio && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="Display">
            <window.TweakSlider label="Font size" value={t.fontScale||1} min={0.85} max={1.4} step={0.05}
              onChange={v=>setTweak('fontScale', v)}/>
            <window.TweakRadio label="Language" value={t.lang||lang}
              options={[{value:"th",label:"🇹🇭 TH"},{value:"en",label:"🇬🇧 EN"}]}
              onChange={v=>{setTweak('lang',v); setLang(v);}}/>
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</head>
<body>
<div id="err" style="display:none;position:fixed;top:0;left:0;right:0;padding:16px;background:red;color:white;font-size:13px;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto"></div>
<div id="root"></div>
<script>window.onerror=function(m){document.getElementById("err").style.display="block";document.getElementById("err").textContent+=m+"\n";}</script>
</body>
</html>
